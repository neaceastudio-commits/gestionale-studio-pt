<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEACEA - Gestionale Studio PT</title>
  <script>
    (function routeProjectHome() {
      const routes = {
        'scheda-pt-cliente.netlify.app': './scheda-cliente/',
        'new-calendar-neacea.netlify.app': './calendario-studio/',
        'anamnesi-acquisizione-cliente.netlify.app': './acquisizione/'
      };
      const target = routes[window.location.hostname];
      const isHome = window.location.pathname === '/' || window.location.pathname.endsWith('/index.html');
      if (target && isHome) {
        window.location.replace(target + window.location.search + window.location.hash);
      }
    })();
  </script>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f5f7;color:#1c3144}
    main{max-width:960px;margin:0 auto;padding:48px 24px}
    h1{margin:0 0 8px;font-size:32px}
    p{margin:0 0 28px;color:#5a7288}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
    a{display:block;padding:20px;border:1px solid #dce4ea;border-radius:10px;background:#fff;color:#1c3144;text-decoration:none;box-shadow:0 1px 4px rgba(28,49,68,.07)}
    a:hover{border-color:#1c3144}
    strong{display:block;margin-bottom:6px}
    span{font-size:14px;color:#5a7288}
  </style>
</head>
<body>
  <main>
    <h1>Gestionale Studio PT</h1>
    <p>Indice locale delle aree operative NEACEA.</p>
    <div class="grid">
      <a href="./scheda-cliente/"><strong>Scheda Cliente</strong><span>Clienti PT, dati fisici, programma, foto e carichi.</span></a>
      <a href="./calendario-studio/"><strong>Calendario Studio</strong><span>Agenda sale, appuntamenti, clienti e staff.</span></a>
      <a href="./acquisizione/"><strong>Acquisizione</strong><span>Anamnesi prospect e conferma cliente.</span></a>
    </div>
  </main>
</body>
</html>
